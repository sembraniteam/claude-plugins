<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archimind Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22253a;
      --border: #2e3250;
      --accent: #6c8ef5;
      --text: #e2e4f0;
      --text-muted: #7a7f9e;
      --text-code: #c9d1f5;
      --green: #4cd964;
      --sidebar-w: 280px;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header h1 {
      font-size: 15px; font-weight: 700; color: var(--accent);
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    #sidebar-header p { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    #file-list { flex: 1; overflow-y: auto; padding: 8px 0; }

    .file-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .file-item:hover { background: var(--surface2); }

    .file-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    .file-item .file-title {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-transform: capitalize;
    }

    .file-item .file-meta {
      font-size: 10px; color: var(--text-muted);
      margin-top: 3px; display: flex; gap: 8px; align-items: center;
    }

    .file-badge {
      padding: 1px 5px; border-radius: 3px;
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .file-badge.architecture { background: rgba(108,142,245,0.2); color: var(--accent); }
    .file-badge.database { background: rgba(76,217,100,0.15); color: var(--green); }

    /* ── Section Nav (left sidebar) ── */
    #section-nav {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    #section-nav.hidden { display: none; }

    .section-nav-label {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .snav-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 16px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .snav-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }

    .snav-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }

    .snav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Sub-tab bar (Option tabs / Before|After tabs) ── */
    #tab-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 16px;
      height: 40px;
      flex-shrink: 0;
    }

    #tab-bar.hidden { display: none; }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: var(--radius) var(--radius) 0 0;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn:hover { color: var(--text); background: var(--surface2); }

    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-btn.selected { background: rgba(76,217,100,0.08); color: var(--green); }

    .tab-btn.selected.active { color: var(--green); border-bottom-color: var(--green); }

    /* ── Content ── */
    #content-wrap { flex: 1; overflow-y: auto; padding: 32px 48px; }

    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 12px;
    }

    #placeholder svg { opacity: 0.3; }
    #placeholder p { font-size: 14px; }

    /* ── Markdown ── */
    #doc-content h1 {
      font-size: 24px; font-weight: 700; color: var(--text);
      margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 10px;
    }

    #doc-content h2 {
      font-size: 18px; font-weight: 700; color: var(--accent); margin: 32px 0 12px;
    }

    #doc-content h3 {
      font-size: 15px; font-weight: 600; color: var(--text); margin: 20px 0 8px;
    }

    #doc-content h4 {
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 0.06em;
    }

    #doc-content p { line-height: 1.7; margin-bottom: 12px; font-size: 14px; color: var(--text); }

    #doc-content ul, #doc-content ol { padding-left: 20px; margin-bottom: 12px; }

    #doc-content li { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 4px; }

    #doc-content strong { color: var(--text); font-weight: 600; }

    #doc-content code {
      background: var(--surface2);
      color: var(--text-code);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Fira Code', 'JetBrains Mono', Menlo, monospace;
    }

    #doc-content pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    #doc-content pre code { background: none; padding: 0; font-size: 13px; color: var(--text-code); }

    #doc-content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }

    #doc-content th {
      background: var(--surface2); padding: 8px 12px;
      text-align: left; font-weight: 600; color: var(--text); border: 1px solid var(--border);
    }

    #doc-content td { padding: 7px 12px; color: var(--text); border: 1px solid var(--border); }

    #doc-content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    #doc-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px; margin-bottom: 16px;
      background: var(--surface2); border-radius: 0 var(--radius) var(--radius) 0;
      font-style: italic; color: var(--text-muted);
    }

    #doc-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ── Mermaid ── */
    .mermaid-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 16px 0;
      overflow: hidden;
    }

    .diagram-actions {
      display: flex;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      justify-content: flex-end;
    }

    .dl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .dl-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

    .diagram-svg-container { padding: 20px; overflow-x: auto; text-align: center; }

    .diagram-svg-container svg { max-width: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Archimind</h1>
    <p>Design Viewer</p>
  </div>
  <div id="file-list">
    <p style="padding:16px;font-size:12px;color:var(--text-muted)">Loading documents…</p>
  </div>

  <!-- Section Nav moved to sidebar -->
  <nav id="section-nav" class="hidden">
    <div class="section-nav-label">Sections</div>
    <button class="snav-btn active" data-view="architecture">Architecture Diagram</button>
    <button class="snav-btn" data-view="erd">ERD</button>
    <button class="snav-btn" data-view="revision">Revision</button>
  </nav>

  <div id="sidebar-footer">
    <span id="doc-count">0 documents</span>
  </div>
</aside>

<main id="main">
  <!-- Sub-tab bar (option tabs or before/after tabs) -->
  <div id="tab-bar" class="hidden"></div>

  <div id="content-wrap">
    <div id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      <p>Select a document from the sidebar</p>
    </div>
    <div id="doc-content" style="display:none"></div>
  </div>
</main>

<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      background: '#22253a',
      primaryColor: '#6c8ef5',
      primaryTextColor: '#e2e4f0',
      primaryBorderColor: '#2e3250',
      lineColor: '#7a7f9e',
      secondaryColor: '#1a1d27',
      tertiaryColor: '#0f1117',
      edgeLabelBackground: '#22253a',
      fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif',
    }
  });

  marked.setOptions({ gfm: true, breaks: false });

  // ── State ──
  let currentFile = null;
  let currentView = 'architecture';
  let currentOptionIndex = 0;
  let currentRevisionTab = 'before';
  let userHasSelectedTab = false;  // tracks if user manually picked a tab
  let parsedDoc = null;
  let optionContents = [];
  let revisionData = { before: '', after: '' };
  let refreshTimer = null;
  let mermaidCounter = 0;

  // ── Manifest / sidebar ──
  async function loadManifest() {
    try {
      const r = await fetch('manifest.json?_=' + Date.now());
      if (!r.ok) throw new Error('manifest not found');
      return await r.json();
    } catch { return { files: [] }; }
  }

  async function populateSidebar() {
    const manifest = await loadManifest();
    const list = document.getElementById('file-list');
    const counter = document.getElementById('doc-count');
    const files = manifest.files || [];

    counter.textContent = files.length + ' document' + (files.length !== 1 ? 's' : '');

    if (files.length === 0) {
      list.innerHTML = '<p style="padding:16px;font-size:12px;color:var(--text-muted)">No design documents found in docs/archimind/</p>';
      return;
    }

    list.innerHTML = '';
    files.forEach(f => {
      const item = document.createElement('div');
      item.className = 'file-item';
      const filePath = f.path || f.name;
      item.dataset.path = filePath;

      const tsMatch = filePath.match(/(\d{10,})[_\-]/);
      let tsLabel = '';
      if (tsMatch) {
        const d = new Date(parseInt(tsMatch[1]));
        tsLabel = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }

      const category = f.category || detectCategory(filePath);
      item.innerHTML = `
        <div class="file-title">${escapeHtml(f.title)}</div>
        <div class="file-meta">
          <span class="file-badge ${category}">${category}</span>
          ${tsLabel ? `<span>${tsLabel}</span>` : ''}
        </div>
      `;
      item.addEventListener('click', () => loadDoc(filePath));
      list.appendChild(item);
    });
  }

  function detectCategory(path) {
    if (/\/database\//i.test(path) || /database/i.test(path)) return 'database';
    return 'architecture';
  }

  // ── Document loading ──
  async function loadDoc(filepath, isRefresh = false) {
    if (!isRefresh) {
      currentFile = filepath;
      document.querySelectorAll('.file-item').forEach(el => {
        el.classList.toggle('active', el.dataset.path === filepath);
      });
    }

    try {
      const r = await fetch(filepath + '?_=' + Date.now());
      if (!r.ok) throw new Error('Could not load ' + filepath);
      const md = await r.text();
      processDoc(md, isRefresh);
    } catch (e) { showError(e.message); }

    clearInterval(refreshTimer);
    refreshTimer = setInterval(() => { if (currentFile) loadDoc(currentFile, true); }, 10000);
  }

  // ── Document parsing ──
  function parseDocument(markdown) {
    const lines = markdown.split('\n');
    const doc = {
      preamble: [],
      archSectionLines: [],
      optionSections: [],
      erdLines: [],
      revisionLines: [],
      recommendationLines: [],
      hasArchSection: false,
      hasERD: false,
      hasRevision: false,
    };

    let mode = 'preamble';
    let optTitle = '';
    let optLines = [];

    function flushOption() {
      if (optTitle) {
        doc.optionSections.push({ title: optTitle, content: optLines.join('\n') });
        optTitle = ''; optLines = [];
      }
    }

    for (const line of lines) {
      if (/^## Architecture Diagram\b/.test(line)) {
        flushOption(); mode = 'arch'; doc.hasArchSection = true; continue;
      }
      if (/^## ERD\b/.test(line)) {
        flushOption(); mode = 'erd'; doc.hasERD = true; doc.erdLines.push(line); continue;
      }
      if (/^## Revision\b/.test(line)) {
        flushOption(); mode = 'revision'; doc.hasRevision = true; doc.revisionLines.push(line); continue;
      }
      if (/^## Recommendation\b/.test(line)) {
        flushOption(); mode = 'recommendation'; doc.recommendationLines.push(line); continue;
      }
      if (/^## Option \d+:/.test(line)) {
        flushOption(); mode = 'option';
        optTitle = line.replace(/^## /, ''); optLines = [line]; continue;
      }

      if (mode === 'preamble') doc.preamble.push(line);
      else if (mode === 'arch') doc.archSectionLines.push(line);
      else if (mode === 'erd') doc.erdLines.push(line);
      else if (mode === 'revision') doc.revisionLines.push(line);
      else if (mode === 'recommendation') doc.recommendationLines.push(line);
      else if (mode === 'option') optLines.push(line);
    }
    flushOption();
    return doc;
  }

  function parseArchSubOptions(content) {
    const optRegex = /^(### (?:Option \d+:|Conservative|Moderate|Full).*)$/gm;
    const options = [];
    let lastIndex = 0; let lastTitle = null; let m;

    while ((m = optRegex.exec(content)) !== null) {
      if (lastTitle !== null) {
        options.push({ title: lastTitle, content: content.slice(lastIndex, m.index).trim() });
      }
      lastTitle = m[1].replace(/^### /, '');
      lastIndex = m.index;
    }
    if (lastTitle !== null) {
      options.push({ title: lastTitle, content: content.slice(lastIndex).trim() });
    }
    return options;
  }

  function parseRevisionContent(content) {
    const bI = content.search(/^### Before\b/m);
    const aI = content.search(/^### After\b/m);
    let before = '', after = '';

    if (bI >= 0 && aI >= 0) {
      before = content.slice(bI).replace(/^### Before\b[^\n]*\n?/, '').slice(0, aI - bI);
      after = content.slice(aI).replace(/^### After\b[^\n]*\n?/, '');
    } else if (bI >= 0) {
      before = content.slice(bI).replace(/^### Before\b[^\n]*\n?/, '');
    } else if (aI >= 0) {
      after = content.slice(aI).replace(/^### After\b[^\n]*\n?/, '');
    } else {
      before = content;
    }
    return { before: before.trim(), after: after.trim() };
  }

  // ── Main render ──
  function processDoc(markdown, isRefresh = false) {
    parsedDoc = parseDocument(markdown);
    optionContents = [];

    if (!isRefresh) {
      // New document — reset all navigation state
      currentView = 'architecture';
      currentOptionIndex = 0;
      currentRevisionTab = 'before';
      userHasSelectedTab = false;
    }

    const sectionNav = document.getElementById('section-nav');
    const placeholder = document.getElementById('placeholder');
    const docContent = document.getElementById('doc-content');

    placeholder.style.display = 'none';
    docContent.style.display = 'block';
    sectionNav.classList.remove('hidden');

    const erdBtn = sectionNav.querySelector('[data-view="erd"]');
    const revBtn = sectionNav.querySelector('[data-view="revision"]');
    erdBtn.disabled = !parsedDoc.hasERD;
    revBtn.disabled = !parsedDoc.hasRevision;

    // On refresh, if current view became unavailable, fall back to architecture
    if (currentView === 'erd' && !parsedDoc.hasERD) currentView = 'architecture';
    if (currentView === 'revision' && !parsedDoc.hasRevision) currentView = 'architecture';

    setView(currentView);
  }

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.snav-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === view);
    });

    if (view === 'architecture') renderArchView();
    else if (view === 'erd') renderERDView();
    else if (view === 'revision') renderRevisionView();
  }

  // ── Architecture view ──
  function renderArchView() {
    const doc = parsedDoc;
    let opts;

    if (doc.hasArchSection) {
      const sub = parseArchSubOptions(doc.archSectionLines.join('\n'));
      opts = sub.length > 0 ? sub : [{ title: 'Overview', content: doc.archSectionLines.join('\n') }];
    } else {
      opts = doc.optionSections.map(o => ({ title: o.title, content: o.content }));
    }

    if (doc.recommendationLines.length > 0) {
      opts = [...opts, { title: 'Recommendation', content: doc.recommendationLines.join('\n') }];
    }

    optionContents = opts;

    const tabBar = document.getElementById('tab-bar');
    tabBar.innerHTML = '';

    if (opts.length > 1) {
      tabBar.classList.remove('hidden');

      // Auto-select the marked option only on first load (user hasn't picked a tab yet)
      const selectedIdx = opts.findIndex(o => /✅\s*SELECTED/i.test(o.title));
      if (selectedIdx >= 0 && !userHasSelectedTab) {
        currentOptionIndex = selectedIdx;
      }
      // Guard against index out of range after document update
      if (currentOptionIndex >= opts.length) currentOptionIndex = 0;

      opts.forEach((opt, i) => {
        const isSelected = /✅\s*SELECTED/i.test(opt.title);
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (isSelected ? ' selected' : '') + (i === currentOptionIndex ? ' active' : '');
        btn.textContent = formatTabLabel(opt.title);
        btn.addEventListener('click', () => switchOptionTab(i));
        tabBar.appendChild(btn);
      });
    } else {
      tabBar.classList.add('hidden');
    }

    renderOptionContent(currentOptionIndex);
  }

  function switchOptionTab(index) {
    currentOptionIndex = index;
    userHasSelectedTab = true;
    document.querySelectorAll('#tab-bar .tab-btn').forEach((b, i) => {
      b.classList.toggle('active', i === index);
    });
    renderOptionContent(index);
  }

  function renderOptionContent(index) {
    const opt = optionContents[index];
    if (!opt) return;

    const docContent = document.getElementById('doc-content');
    const preamble = parsedDoc.preamble.join('\n');

    let html = '';
    if (preamble.trim() && index === 0) html += marked.parse(preamble);
    html += marked.parse(opt.content);

    docContent.innerHTML = html;
    renderMermaid(docContent);
    document.getElementById('content-wrap').scrollTop = 0;
  }

  // ── ERD view ──
  function renderERDView() {
    const tabBar = document.getElementById('tab-bar');
    const docContent = document.getElementById('doc-content');

    tabBar.classList.add('hidden');
    tabBar.innerHTML = '';

    if (!parsedDoc.hasERD) {
      docContent.innerHTML = '<p style="color:var(--text-muted);padding:20px 0">No ERD section found in this document.</p>';
      return;
    }

    docContent.innerHTML = marked.parse(parsedDoc.erdLines.join('\n'));
    renderMermaid(docContent);
    document.getElementById('content-wrap').scrollTop = 0;
  }

  // ── Revision view ──
  function renderRevisionView() {
    const tabBar = document.getElementById('tab-bar');
    const docContent = document.getElementById('doc-content');

    if (!parsedDoc.hasRevision) {
      tabBar.classList.add('hidden');
      tabBar.innerHTML = '';
      docContent.innerHTML = '<p style="color:var(--text-muted);padding:20px 0">No Revision section found in this document.</p>';
      return;
    }

    revisionData = parseRevisionContent(parsedDoc.revisionLines.join('\n'));

    tabBar.innerHTML = '';
    tabBar.classList.remove('hidden');

    ['before', 'after'].forEach(tab => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (tab === currentRevisionTab ? ' active' : '');
      btn.textContent = tab === 'before' ? 'Before' : 'After';
      btn.dataset.rtab = tab;
      btn.addEventListener('click', () => switchRevisionTab(tab));
      tabBar.appendChild(btn);
    });

    renderRevisionTabContent(currentRevisionTab);
  }

  function switchRevisionTab(tab) {
    currentRevisionTab = tab;
    document.querySelectorAll('#tab-bar .tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.rtab === tab);
    });
    renderRevisionTabContent(tab);
  }

  function renderRevisionTabContent(tab) {
    const docContent = document.getElementById('doc-content');
    const content = tab === 'before' ? revisionData.before : revisionData.after;

    if (!content.trim()) {
      docContent.innerHTML = `<p style="color:var(--text-muted);padding:20px 0">No "${tab}" content found.</p>`;
      return;
    }

    docContent.innerHTML = marked.parse(content);
    renderMermaid(docContent);
    document.getElementById('content-wrap').scrollTop = 0;
  }

  // ── Mermaid rendering with download buttons ──
  async function renderMermaid(container) {
    const blocks = container.querySelectorAll('pre code.language-mermaid');
    let idx = 0;

    for (const code of blocks) {
      const pre = code.parentElement;
      const def = code.textContent;
      const id = 'mermaid-' + (++mermaidCounter) + '-' + (idx++);
      const wrap = document.createElement('div');
      wrap.className = 'mermaid-wrap';

      try {
        const { svg } = await mermaid.render(id, def);

        const actions = document.createElement('div');
        actions.className = 'diagram-actions';

        const svgBtn = document.createElement('button');
        svgBtn.className = 'dl-btn';
        svgBtn.textContent = '↓ SVG';
        svgBtn.title = 'Download as SVG';

        const pngBtn = document.createElement('button');
        pngBtn.className = 'dl-btn';
        pngBtn.textContent = '↓ PNG';
        pngBtn.title = 'Download as PNG';

        actions.appendChild(svgBtn);
        actions.appendChild(pngBtn);

        const svgContainer = document.createElement('div');
        svgContainer.className = 'diagram-svg-container';
        svgContainer.innerHTML = svg;

        const svgEl = svgContainer.querySelector('svg');
        const diagName = 'diagram-' + mermaidCounter;

        svgBtn.addEventListener('click', () => downloadSVG(svgEl, diagName));
        pngBtn.addEventListener('click', () => downloadPNG(svgEl, diagName));

        wrap.appendChild(actions);
        wrap.appendChild(svgContainer);
      } catch (err) {
        wrap.innerHTML = `<pre style="color:#f47983;font-size:12px;padding:16px">Mermaid error:\n${escapeHtml(err.message)}</pre>`;
      }

      pre.parentNode.replaceChild(wrap, pre);
    }
  }

  // ── Download helpers ──
  function downloadSVG(svgEl, name) {
    if (!svgEl) return;
    const data = new XMLSerializer().serializeToString(svgEl);
    const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
    triggerDownload(URL.createObjectURL(blob), name + '.svg');
  }

  function downloadPNG(svgEl, name) {
    if (!svgEl) return;

    // Clone the SVG and set explicit dimensions so the browser can rasterize it
    const svgClone = svgEl.cloneNode(true);
    const rect = svgEl.getBoundingClientRect();
    const vb = svgEl.viewBox?.baseVal;
    const w = Math.max(rect.width || 0, vb?.width || 0, 400);
    const h = Math.max(rect.height || 0, vb?.height || 0, 300);
    svgClone.setAttribute('width', w);
    svgClone.setAttribute('height', h);

    const xml = new XMLSerializer().serializeToString(svgClone);
    const svgBlob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = w * scale;
      canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#22253a';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        if (blob) triggerDownload(URL.createObjectURL(blob), name + '.png');
      }, 'image/png');
      URL.revokeObjectURL(url);
    };
    img.onerror = () => URL.revokeObjectURL(url);
    img.src = url;
  }

  function triggerDownload(href, filename) {
    const a = document.createElement('a');
    a.href = href; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(href), 200);
  }

  // ── Utilities ──
  function formatTabLabel(title) {
    const isSelected = /✅\s*SELECTED/i.test(title);
    const cleaned = title.replace(/✅\s*SELECTED/i, '').trim();
    const m = cleaned.match(/Option \d+:\s*([\w\s]+?)(?:\s*—|\s*\(|$)/);
    const label = m ? m[1].trim() : cleaned.replace(/^Option \d+:\s*/, '');
    return isSelected ? label + ' ✅' : label;
  }

  function showError(msg) {
    const el = document.getElementById('doc-content');
    el.style.display = 'block';
    el.innerHTML = `<p style="color:#f47983;font-size:14px;padding:20px 0">Error: ${escapeHtml(msg)}</p>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Section nav event listeners ──
  document.querySelectorAll('.snav-btn').forEach(btn => {
    btn.addEventListener('click', () => { if (!btn.disabled) setView(btn.dataset.view); });
  });

  // ── Init ──
  populateSidebar();
</script>
</body>
</html>
