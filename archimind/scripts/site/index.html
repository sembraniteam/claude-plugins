<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archimind Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22253a;
      --border: #2e3250; --accent: #6c8ef5; --text: #e2e4f0;
      --muted: #7a7f9e; --code: #c9d1f5;
      --sidebar-w: 240px; --r: 8px;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

    #sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #sidebar-header h1 { font-size: 14px; font-weight: 700; color: var(--accent);
      letter-spacing: .05em; text-transform: uppercase; }
    #doc-title { font-size: 12px; color: var(--muted); margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: capitalize; }

    /* Section nav */
    #section-nav { flex: 1; display: flex; flex-direction: column; padding: 12px 0; }
    .nav-label { padding: 6px 16px 4px; font-size: 10px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .snav-btn { display: block; width: 100%; text-align: left; background: none;
      border: none; border-left: 3px solid transparent; color: var(--muted);
      font-size: 13px; font-weight: 500; padding: 10px 16px; cursor: pointer;
      font-family: inherit; transition: background .15s, color .15s, border-color .15s; }
    .snav-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
    .snav-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
    .snav-btn:disabled { opacity: .3; cursor: not-allowed; }

    #sidebar-footer { padding: 10px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    #reload-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: inherit;
      transition: all .15s; width: 100%; }
    #reload-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* Tab bar */
    #tab-bar { background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 2px; padding: 0 16px; height: 40px; flex-shrink: 0; }
    #tab-bar.hidden { display: none; }
    .tab-btn { background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 500;
      padding: 5px 14px; border-radius: var(--r) var(--r) 0 0; cursor: pointer;
      transition: color .15s, background .15s; border-bottom: 2px solid transparent; }
    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Content */
    #content-wrap { flex: 1; overflow-y: auto; padding: 32px 48px; }
    #placeholder { display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--muted); gap: 12px; }
    #placeholder svg { opacity: .3; }
    #placeholder p { font-size: 14px; }
    #doc-content { display: none; }

    /* Markdown */
    #doc-content h1 { font-size: 22px; font-weight: 700; color: var(--text);
      margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    #doc-content h2 { font-size: 17px; font-weight: 700; color: var(--accent); margin: 28px 0 10px; }
    #doc-content h3 { font-size: 14px; font-weight: 600; color: var(--text); margin: 18px 0 7px; }
    #doc-content h4 { font-size: 12px; font-weight: 600; color: var(--muted);
      margin: 14px 0 5px; text-transform: uppercase; letter-spacing: .06em; }
    #doc-content p { line-height: 1.7; margin-bottom: 12px; font-size: 14px; color: var(--text); }
    #doc-content ul, #doc-content ol { padding-left: 20px; margin-bottom: 12px; }
    #doc-content li { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 3px; }
    #doc-content strong { color: var(--text); font-weight: 600; }
    #doc-content code { background: var(--surface2); color: var(--code); padding: 1px 6px;
      border-radius: 4px; font-size: 12px; font-family: 'Fira Code', Menlo, monospace; }
    #doc-content pre { background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px; overflow-x: auto; margin-bottom: 16px; }
    #doc-content pre code { background: none; padding: 0; font-size: 13px; color: var(--code); }
    #doc-content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
    #doc-content th { background: var(--surface2); padding: 8px 12px; text-align: left;
      font-weight: 600; color: var(--text); border: 1px solid var(--border); }
    #doc-content td { padding: 7px 12px; color: var(--text); border: 1px solid var(--border); }
    #doc-content tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    #doc-content blockquote { border-left: 3px solid var(--accent); padding: 8px 16px;
      margin-bottom: 16px; background: var(--surface2); border-radius: 0 var(--r) var(--r) 0;
      font-style: italic; color: var(--muted); }
    #doc-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ── Mermaid diagram ── */
    .mermaid-wrap { background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); margin: 16px 0; overflow: hidden; }

    /* Toolbar: zoom controls on left, PNG button on right */
    .diagram-actions { display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 6px 12px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .diagram-controls { display: flex; gap: 4px; align-items: center; }
    .ctrl-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      font-size: 13px; font-weight: 600; width: 26px; height: 22px; border-radius: 4px;
      cursor: pointer; transition: all .15s; font-family: inherit; line-height: 1;
      display: inline-flex; align-items: center; justify-content: center; }
    .ctrl-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .dl-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 4px; cursor: pointer;
      transition: all .15s; font-family: inherit; }
    .dl-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Pan/zoom container */
    .diagram-svg-container { padding: 20px; overflow: hidden; cursor: grab;
      position: relative; user-select: none; min-height: 500px; }
    .diagram-svg-container.grabbing { cursor: grabbing; }
    .diagram-inner { display: inline-block; transform-origin: 0 0; }
    .diagram-inner svg { display: block; max-width: none; }


    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Archimind</h1>
    <p id="doc-title">Loading…</p>
  </div>
  <nav id="section-nav">
    <div class="nav-label">Sections</div>
    <button class="snav-btn active" data-view="architecture">Architecture Diagram</button>
    <button class="snav-btn" data-view="erd" id="btn-erd">ERD</button>
    <button class="snav-btn" data-view="revision" id="btn-rev">Revision</button>
  </nav>
  <div id="sidebar-footer">
    <button id="reload-btn" onclick="loadContent()">↺ Reload</button>
  </div>
</aside>

<main id="main">
  <div id="tab-bar" class="hidden"></div>
  <div id="content-wrap">
    <div id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>
      <p>Loading content…</p>
    </div>
    <div id="doc-content"></div>
  </div>
</main>

<script>
  mermaid.initialize({
    startOnLoad: false, theme: 'dark',
    themeVariables: {
      background: '#22253a', primaryColor: '#6c8ef5', primaryTextColor: '#e2e4f0',
      primaryBorderColor: '#2e3250', lineColor: '#7a7f9e', secondaryColor: '#1a1d27',
      tertiaryColor: '#0f1117', edgeLabelBackground: '#22253a',
      fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif',
    }
  });
  marked.setOptions({ gfm: true, breaks: false });

  // ── State ──
  let currentView = 'architecture';
  let currentOptionIdx = 0;
  let currentRevTab = 'before';
  let userHasSelectedTab = false;
  let parsedDoc = null;
  let optionContents = [];
  let revisionData = { before: '', after: '' };
  let mermaidCtr = 0;

  // ── Pan/zoom global drag state ──
  let activeDrag = null; // { pz, lastX, lastY }

  document.addEventListener('mousemove', e => {
    if (!activeDrag) return;
    const { pz } = activeDrag;
    pz.tx += e.clientX - activeDrag.lastX;
    pz.ty += e.clientY - activeDrag.lastY;
    activeDrag.lastX = e.clientX;
    activeDrag.lastY = e.clientY;
    pz.apply();
  });

  document.addEventListener('mouseup', () => {
    if (activeDrag) {
      activeDrag.pz.container.classList.remove('grabbing');
      activeDrag = null;
    }
  });

  function makePanZoom(container, inner, btnIn, btnOut, btnReset) {
    const pz = {
      container, inner,
      tx: 0, ty: 0, scale: 1, initTx: 0, initScale: 1,
      apply() {
        inner.style.transform = `translate(${this.tx}px,${this.ty}px) scale(${this.scale})`;
      }
    };

    container.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      // Zoom centered on cursor: keep content-space point under cursor fixed
      const cx = (mx - pz.tx) / pz.scale;
      const cy = (my - pz.ty) / pz.scale;
      pz.scale = Math.min(Math.max(pz.scale * factor, 0.1), 10);
      pz.tx = mx - cx * pz.scale;
      pz.ty = my - cy * pz.scale;
      pz.apply();
    }, { passive: false });

    container.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      activeDrag = { pz, lastX: e.clientX, lastY: e.clientY };
      container.classList.add('grabbing');
    });

    btnIn.addEventListener('click', () => {
      pz.scale = Math.min(pz.scale * 1.3, 10); pz.apply();
    });
    btnOut.addEventListener('click', () => {
      pz.scale = Math.max(pz.scale / 1.3, 0.1); pz.apply();
    });
    btnReset.addEventListener('click', () => {
      pz.tx = pz.initTx; pz.ty = 0; pz.scale = pz.initScale; pz.apply();
    });
    return pz;
  }

  // ── Load content.md ──
  async function loadContent() {
    try {
      const r = await fetch('./content.md?_=' + Date.now());
      if (!r.ok) {
        showError('content.md not found. Write the design content to this file and reload.');
        return;
      }
      const md = await r.text();
      processDoc(md);
    } catch (e) {
      showError(e.message);
    }
  }

  // ── Document parsing ──
  function parseDocument(markdown) {
    const lines = markdown.split('\n');
    const doc = {
      preamble: [], arch: [], erd: [], revision: [], recommendation: [],
      has_arch: false, has_erd: false, has_revision: false, title: ''
    };
    let mode = 'preamble';

    for (const line of lines) {
      if (!doc.title && line.startsWith('# ')) doc.title = line.slice(2).trim();
      if (/^## Architecture Diagram\b/.test(line)) { mode = 'arch'; doc.has_arch = true; continue; }
      if (/^## ERD\b/.test(line)) { mode = 'erd'; doc.has_erd = true; doc.erd.push(line); continue; }
      if (/^## Revision\b/.test(line)) { mode = 'revision'; doc.has_revision = true; doc.revision.push(line); continue; }
      if (/^## Recommendation\b/.test(line)) { mode = 'rec'; doc.recommendation.push(line); continue; }
      if (/^## /.test(line) && mode !== 'preamble') { mode = 'skip'; continue; }
      const targets = { preamble: doc.preamble, arch: doc.arch, erd: doc.erd, revision: doc.revision, rec: doc.recommendation };
      if (targets[mode]) targets[mode].push(line);
    }
    return doc;
  }

  function parseSubOptions(content) {
    const pat = /^(### (?:Option \d+:|Conservative|Moderate|Full).*)$/gm;
    const opts = []; let last_i = 0, last_t = null, m;
    while ((m = pat.exec(content)) !== null) {
      if (last_t !== null) opts.push({ title: last_t, content: content.slice(last_i, m.index).trim() });
      last_t = m[1].replace(/^### /, ''); last_i = m.index;
    }
    if (last_t !== null) opts.push({ title: last_t, content: content.slice(last_i).trim() });
    return opts;
  }

  function parseRevision(content) {
    const bm = content.search(/^### Before\b/m);
    const am = content.search(/^### After\b/m);
    let before = '', after = '';
    if (bm >= 0 && am >= 0) {
      before = content.slice(bm).replace(/^### Before\b[^\n]*\n?/, '').slice(0, am - bm).trim();
      after  = content.slice(am).replace(/^### After\b[^\n]*\n?/, '').trim();
    } else if (bm >= 0) {
      before = content.slice(bm).replace(/^### Before\b[^\n]*\n?/, '').trim();
    } else if (am >= 0) {
      after  = content.slice(am).replace(/^### After\b[^\n]*\n?/, '').trim();
    } else { before = content.trim(); }
    return { before, after };
  }

  // ── Main render ──
  function processDoc(markdown) {
    activeDrag = null;
    parsedDoc = parseDocument(markdown);
    currentView = 'architecture';
    currentOptionIdx = 0;
    currentRevTab = 'before';
    userHasSelectedTab = false;
    optionContents = [];

    document.getElementById('doc-title').textContent = parsedDoc.title || 'Design Document';
    document.title = parsedDoc.title || 'Archimind Viewer';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('doc-content').style.display = 'block';

    document.getElementById('btn-erd').disabled = !parsedDoc.has_erd;
    document.getElementById('btn-rev').disabled = !parsedDoc.has_revision;

    setView('architecture');
  }

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.snav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    if (view === 'architecture') renderArchView();
    else if (view === 'erd') renderERDView();
    else if (view === 'revision') renderRevisionView();
  }

  // ── Architecture view ──
  function renderArchView() {
    const doc = parsedDoc;
    let opts;
    if (doc.has_arch) {
      const sub = parseSubOptions(doc.arch.join('\n'));
      opts = sub.length > 0 ? sub : [{ title: 'Overview', content: doc.arch.join('\n') }];
    } else {
      opts = [{ title: 'Overview', content: parsedDoc.preamble.join('\n') }];
    }
    if (doc.recommendation.length > 0) opts.push({ title: 'Recommendation', content: doc.recommendation.join('\n') });
    optionContents = opts;

    const tb = document.getElementById('tab-bar');
    tb.innerHTML = '';
    if (opts.length > 1) {
      tb.classList.remove('hidden');
      if (currentOptionIdx >= opts.length) currentOptionIdx = 0;
      opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === currentOptionIdx ? ' active' : '');
        btn.textContent = fmtLabel(opt.title);
        btn.addEventListener('click', () => switchOptTab(i));
        tb.appendChild(btn);
      });
    } else {
      tb.classList.add('hidden');
    }
    renderOptContent(currentOptionIdx);
  }

  function switchOptTab(i) {
    currentOptionIdx = i; userHasSelectedTab = true;
    document.querySelectorAll('#tab-bar .tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
    renderOptContent(i);
  }

  function renderOptContent(i) {
    const opt = optionContents[i];
    if (!opt) return;
    const dc = document.getElementById('doc-content');
    let html = '';
    if (parsedDoc.preamble.join('\n').trim() && i === 0) html += marked.parse(parsedDoc.preamble.join('\n'));
    html += marked.parse(opt.content);
    dc.innerHTML = html;
    renderMermaid(dc);
    document.getElementById('content-wrap').scrollTop = 0;
  }

  // ── ERD view ──
  function renderERDView() {
    const tb = document.getElementById('tab-bar');
    tb.classList.add('hidden'); tb.innerHTML = '';
    const dc = document.getElementById('doc-content');
    const erd = parsedDoc.erd.join('\n');
    dc.innerHTML = erd ? marked.parse(erd) : '<p style="color:var(--muted);padding:20px 0">No ERD section found.</p>';
    renderMermaid(dc);
    document.getElementById('content-wrap').scrollTop = 0;
  }

  // ── Revision view ──
  function renderRevisionView() {
    const tb = document.getElementById('tab-bar');
    tb.innerHTML = ''; tb.classList.remove('hidden');
    revisionData = parseRevision(parsedDoc.revision.join('\n'));
    ['before', 'after'].forEach(tab => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (tab === currentRevTab ? ' active' : '');
      btn.textContent = tab === 'before' ? 'Before' : 'After';
      btn.dataset.rtab = tab;
      btn.addEventListener('click', () => switchRevTab(tab));
      tb.appendChild(btn);
    });
    renderRevContent(currentRevTab);
  }

  function switchRevTab(tab) {
    currentRevTab = tab;
    document.querySelectorAll('#tab-bar .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.rtab === tab));
    renderRevContent(tab);
  }

  function renderRevContent(tab) {
    const content = tab === 'before' ? revisionData.before : revisionData.after;
    const dc = document.getElementById('doc-content');
    if (!content?.trim()) {
      dc.innerHTML = `<p style="color:var(--muted);padding:20px 0">No "${tab}" content found.</p>`;
      return;
    }
    dc.innerHTML = marked.parse(content);
    renderMermaid(dc);
    document.getElementById('content-wrap').scrollTop = 0;
  }


  // ── Mermaid rendering ──
  async function renderMermaid(container) {
    const blocks = container.querySelectorAll('pre code.language-mermaid');
    let idx = 0;
    for (const code of blocks) {
      const pre = code.parentElement;
      const id = 'mmd-' + (++mermaidCtr) + '-' + (idx++);
      const wrap = document.createElement('div');
      wrap.className = 'mermaid-wrap';
      let pz = null, svgContainer = null, svgInner = null;
      try {
        const { svg } = await mermaid.render(id, code.textContent);

        // ── Toolbar ──
        const actions = document.createElement('div');
        actions.className = 'diagram-actions';

        // Left: zoom controls
        const controls = document.createElement('div');
        controls.className = 'diagram-controls';
        const btnOut   = makeCtrl('−', 'Zoom out');
        const btnIn    = makeCtrl('+', 'Zoom in');
        const btnReset = makeCtrl('⤢', 'Reset view');
        controls.append(btnOut, btnIn, btnReset);

        // Right: PNG download
        const pngBtn = document.createElement('button');
        pngBtn.className = 'dl-btn';
        pngBtn.textContent = '↓ PNG';

        actions.append(controls, pngBtn);

        // ── SVG pan/zoom container ──
        svgContainer = document.createElement('div');
        svgContainer.className = 'diagram-svg-container';
        svgInner = document.createElement('div');
        svgInner.className = 'diagram-inner';
        svgInner.innerHTML = svg;
        svgContainer.appendChild(svgInner);

        const svgEl = svgInner.querySelector('svg');
        const name = 'diagram-' + mermaidCtr;

        pngBtn.addEventListener('click', () => dlPNG(svgEl, name));
        pz = makePanZoom(svgContainer, svgInner, btnIn, btnOut, btnReset);

        wrap.append(actions, svgContainer);
      } catch (err) {
        wrap.innerHTML = `<pre style="color:#f47983;padding:16px">Mermaid error:\n${esc(err.message)}</pre>`;
      }
      pre.parentNode.replaceChild(wrap, pre);

      // Fit diagram to container on first display.
      // Deferred into rAF so the browser has performed layout and
      // clientWidth / getBoundingClientRect() return real values.
      if (pz && svgContainer && svgInner) {
        requestAnimationFrame(() => {
          const svgEl = svgInner.querySelector('svg');
          if (!svgEl) return;
          const padding = 40; // 2 × 20px container padding
          const availW = svgContainer.clientWidth - padding;
          // Prefer rendered BBox (actual CSS pixels) over viewBox coordinate units,
          // since viewBox dimensions can be in a large internal coordinate space
          // (e.g. 5000 units) that doesn't map 1:1 to screen pixels.
          let natW = svgEl.getBoundingClientRect().width;
          if (!natW) {
            const vb = svgEl.viewBox?.baseVal;
            natW = (vb && vb.width > 0) ? vb.width
                 : parseFloat(svgEl.getAttribute('width')) || 0;
          }
          if (natW <= 0 || availW <= 0) return;
          // Always scale to fill container width (SVG is vector — no quality loss).
          const s = availW / natW;
          pz.scale = s; pz.initScale = s;
          pz.tx = 0; pz.initTx = 0;
          pz.apply();
        });
      }
    }
  }

  function makeCtrl(text, title) {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn';
    btn.textContent = text;
    btn.title = title;
    return btn;
  }

  // ── PNG download ──
  function dlPNG(el, name) {
    if (!el) return;

    // Resolve dimensions: viewBox → getBoundingClientRect → attributes
    const vb = el.viewBox?.baseVal;
    const rect = el.getBoundingClientRect();
    let w, h;
    if (vb && vb.width > 0 && vb.height > 0) {
      w = vb.width; h = vb.height;
    } else if (rect.width > 0) {
      w = rect.width; h = rect.height;
    } else {
      w = parseFloat(el.getAttribute('width')) || 800;
      h = parseFloat(el.getAttribute('height')) || 600;
    }

    // Clone, set explicit size and xmlns for serialization
    const clone = el.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.setAttribute('width', w);
    clone.setAttribute('height', h);
    clone.removeAttribute('style'); // strip any transform from pan/zoom

    const serialized = new XMLSerializer().serializeToString(clone);
    // Use base64 data URL — avoids cross-origin Blob URL restrictions in some browsers.
    // TextEncoder replaces the deprecated btoa(unescape(encodeURIComponent())) pattern.
    const bytes = new TextEncoder().encode(serialized);
    let binary = '';
    for (const b of bytes) binary += String.fromCharCode(b);
    const b64 = btoa(binary);
    const dataUrl = 'data:image/svg+xml;base64,' + b64;

    const SCALE = 2; // 2× for retina quality
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = w * SCALE; c.height = h * SCALE;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#22253a';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(b => { if (b) trigger(URL.createObjectURL(b), name + '.png'); }, 'image/png');
    };
    img.onerror = () => {
      // Fallback: serve raw SVG renamed as .png (better than nothing)
      trigger(dataUrl, name + '.png');
    };
    img.src = dataUrl;
  }

  function trigger(href, filename) {
    const a = document.createElement('a');
    a.href = href; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    if (href.startsWith('blob:')) setTimeout(() => URL.revokeObjectURL(href), 200);
  }

  // ── Utilities ──
  function fmtLabel(title) {
    const m = title.match(/Option \d+:\s*([^—(\n]+?)(?:\s*—|\s*\(|$)/);
    return m ? m[1].trim() : title.replace(/^Option \d+:\s*/, '');
  }

  function showError(msg) {
    document.getElementById('placeholder').innerHTML = `
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f47983" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
      </svg>
      <p style="color:#f47983;text-align:center;max-width:320px">${esc(msg)}</p>`;
    document.getElementById('placeholder').style.display = 'flex';
    document.getElementById('doc-content').style.display = 'none';
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Section nav ──
  document.querySelectorAll('.snav-btn').forEach(btn =>
    btn.addEventListener('click', () => { if (!btn.disabled) setView(btn.dataset.view); }));

  // ── Init ──
  loadContent();
</script>
</body>
</html>
